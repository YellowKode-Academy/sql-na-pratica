version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sql-guia-postgres
    environment:
      POSTGRES_USER: sqladmin
      POSTGRES_PASSWORD: sqladmin123
      POSTGRES_DB: sqldemo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqladmin -d sqldemo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
